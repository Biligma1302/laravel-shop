services:
  web:
    image: dh-mirror.gitverse.ru/library/nginx:latest
    container_name: nginx-laravel
    ports:
      - 8085:80
    volumes:
      - ./Nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html

  php-fpm:
    container_name: php-fpm-laravel
    build: ./Php-fpm
    volumes:
      - ./:/var/www/html


  postgres_db:
    image: dh-mirror.gitverse.ru/library/postgres:17
    container_name: postgres_db_laravel
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - 5434:5432